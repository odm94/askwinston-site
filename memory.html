<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Winston 🎩 — Memory & Tasks</title>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --dark: #0d0d0d;
      --dark2: #141414;
      --dark3: #1c1c1c;
      --gray: #888;
      --light: #f0ebe0;
      --white: #ffffff;
      --green: #4caf50;
      --red: #ef5350;
      --yellow: #ffc107;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark);
      color: var(--light);
      font-family: 'Georgia', serif;
      line-height: 1.7;
    }

    /* ── AUTH GATE ── */
    #auth-gate {
      position: fixed; inset: 0;
      background: var(--dark);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      flex-direction: column; gap: 24px;
    }
    #auth-gate .logo { font-size: 48px; margin-bottom: 8px; }
    #auth-gate h2 { color: var(--gold); font-size: 22px; letter-spacing: 2px; }
    #auth-gate p { color: var(--gray); font-size: 13px; }
    #auth-gate input {
      background: var(--dark3);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--white);
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 8px;
      width: 280px;
      text-align: center;
      letter-spacing: 3px;
      outline: none;
    }
    #auth-gate input:focus { border-color: var(--gold); }
    #auth-gate button {
      background: var(--gold);
      color: var(--dark);
      border: none;
      padding: 12px 40px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 2px;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    #auth-gate button:hover { background: var(--gold-light); }
    #auth-error { color: var(--red); font-size: 13px; min-height: 18px; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      background: rgba(13,13,13,0.95);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 16px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-size: 18px; font-weight: bold; color: var(--gold); letter-spacing: 1px; }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a { color: var(--gray); text-decoration: none; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }

    /* ── MAIN ── */
    main { padding: 100px 40px 60px; max-width: 1100px; margin: 0 auto; }

    .page-title {
      text-align: center; margin-bottom: 48px;
    }
    .page-title .badge {
      display: inline-block;
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold);
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      padding: 5px 16px; border-radius: 20px; margin-bottom: 16px;
    }
    .page-title h1 { font-size: 36px; color: var(--white); }
    .page-title .sub { color: var(--gray); font-size: 14px; margin-top: 8px; }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 4px;
      border-bottom: 1px solid rgba(201,168,76,0.15);
      margin-bottom: 40px;
    }
    .tab-btn {
      background: none; border: none;
      color: var(--gray); font-size: 14px; letter-spacing: 1px; text-transform: uppercase;
      padding: 12px 24px; cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s; font-family: 'Georgia', serif;
    }
    .tab-btn:hover { color: var(--light); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── TODO STYLES ── */
    .todo-section { margin-bottom: 40px; }
    .todo-section h3 {
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--gray); margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .todo-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 16px; margin-bottom: 8px;
      background: var(--dark2);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      transition: border-color 0.2s;
    }
    .todo-item:hover { border-color: rgba(201,168,76,0.2); }
    .todo-item .priority {
      font-size: 16px; flex-shrink: 0; margin-top: 2px;
    }
    .todo-item .text { flex: 1; font-size: 15px; color: var(--light); }
    .todo-item .text strong { color: var(--white); }
    .todo-item.done { opacity: 0.4; }
    .todo-item.done .text { text-decoration: line-through; }

    /* ── MEMORY STYLES ── */
    .memory-block {
      background: var(--dark2);
      border: 1px solid rgba(201,168,76,0.1);
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .memory-block h3 {
      color: var(--gold);
      font-size: 16px; margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(201,168,76,0.15);
    }
    .memory-block p, .memory-block li {
      font-size: 14px; color: var(--light);
      margin-bottom: 8px; line-height: 1.7;
    }
    .memory-block ul { padding-left: 20px; }
    .memory-raw {
      font-family: 'Courier New', monospace;
      font-size: 13px; color: #aaa;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── DAILY LOG ── */
    .day-entry {
      background: var(--dark2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .day-entry h4 { color: var(--gold); font-size: 14px; margin-bottom: 10px; }
    .day-entry .day-content {
      font-family: 'Courier New', monospace;
      font-size: 12px; color: #999;
      white-space: pre-wrap; line-height: 1.7;
    }

    .refresh-btn {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold);
      padding: 8px 20px; font-size: 12px;
      letter-spacing: 1px; text-transform: uppercase;
      border-radius: 6px; cursor: pointer;
      transition: all 0.2s; margin-bottom: 24px;
      font-family: 'Georgia', serif;
    }
    .refresh-btn:hover { background: rgba(201,168,76,0.1); }
    .last-updated { color: var(--gray); font-size: 12px; margin-bottom: 24px; }
  </style>
</head>
<body>

<!-- ── AUTH GATE ── -->
<div id="auth-gate">
  <div class="logo">🎩</div>
  <h2>WINSTON — PRIVATE</h2>
  <p>This page is restricted. Enter your access code.</p>
  <input type="password" id="pw-input" placeholder="••••••••" autocomplete="off" />
  <button onclick="checkAuth()">Enter</button>
  <div id="auth-error"></div>
</div>

<!-- ── NAV ── -->
<nav>
  <div class="nav-logo">🎩 WINSTON</div>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="x-pulse.html">X Pulse</a>
    <a href="logs.html">Logs</a>
    <a href="memory.html" class="active">Memory</a>
  </div>
</nav>

<main id="main-content" style="display:none">
  <div class="page-title">
    <div class="badge">Private</div>
    <h1>Memory & Tasks</h1>
    <p class="sub">Winston's mind — long-term memory, open tasks, and daily logs</p>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('todo')">📋 To-Do</button>
    <button class="tab-btn" onclick="switchTab('memory')">🧠 Memory</button>
    <button class="tab-btn" onclick="switchTab('daily')">📓 Daily Log</button>
  </div>

  <!-- TODO TAB -->
  <div class="tab-panel active" id="tab-todo">
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    <div id="last-updated-todo" class="last-updated"></div>
    <div id="todo-container"><p style="color:var(--gray)">Loading...</p></div>
  </div>

  <!-- MEMORY TAB -->
  <div class="tab-panel" id="tab-memory">
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    <div id="last-updated-mem" class="last-updated"></div>
    <div id="memory-container"><p style="color:var(--gray)">Loading...</p></div>
  </div>

  <!-- DAILY LOG TAB -->
  <div class="tab-panel" id="tab-daily">
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    <div id="daily-container"><p style="color:var(--gray)">Loading...</p></div>
  </div>
</main>

<script>
// ── AUTH ──
const PASS_HASH = '8e62fb0f9c1a7e3df27fb2b6e1d3c4a9b5f8e2d1c6a7f3b9e4d2c8a1f6b3e9d7'; // placeholder, set below
const CORRECT = 'odm94'; // password — change this

function checkAuth() {
  const val = document.getElementById('pw-input').value;
  if (val === CORRECT) {
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    sessionStorage.setItem('winstonAuth', '1');
    loadData();
  } else {
    document.getElementById('auth-error').textContent = 'Incorrect. Try again.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAuth();
});

// Auto-unlock if already authenticated this session
if (sessionStorage.getItem('winstonAuth') === '1') {
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
}

// ── TABS ──
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ── DATA ──
async function loadData() {
  try {
    const res = await fetch('data/memory.json?t=' + Date.now());
    const data = await res.json();
    renderTodo(data.todo);
    renderMemory(data.memory);
    renderDaily(data.daily);
    const ts = new Date(data.generated).toLocaleString('en-US', {timeZone:'America/New_York'});
    document.getElementById('last-updated-todo').textContent = 'Last updated: ' + ts + ' EST';
    document.getElementById('last-updated-mem').textContent = 'Last updated: ' + ts + ' EST';
  } catch(e) {
    document.getElementById('todo-container').innerHTML = '<p style="color:var(--red)">Failed to load data. Run the export script.</p>';
  }
}

function renderTodo(items) {
  if (!items || !items.length) {
    document.getElementById('todo-container').innerHTML = '<p style="color:var(--gray)">No items found.</p>';
    return;
  }
  const high = items.filter(i => i.priority === 'high' && !i.done);
  const med  = items.filter(i => i.priority === 'medium' && !i.done);
  const low  = items.filter(i => i.priority === 'low' && !i.done);
  const done = items.filter(i => i.done);

  let html = '';
  if (high.length) html += section('🔴 High Priority', high);
  if (med.length)  html += section('🟡 Medium', med);
  if (low.length)  html += section('⚪ Backlog', low);
  if (done.length) html += section('✅ Done', done, true);
  document.getElementById('todo-container').innerHTML = html;
}

function section(title, items, isDone=false) {
  const rows = items.map(i => `
    <div class="todo-item${isDone ? ' done' : ''}">
      <span class="priority">${isDone ? '✅' : (i.priority==='high'?'🔴':i.priority==='medium'?'🟡':'⚪')}</span>
      <span class="text">${i.text}</span>
    </div>`).join('');
  return `<div class="todo-section"><h3>${title}</h3>${rows}</div>`;
}

function renderMemory(md) {
  if (!md) { document.getElementById('memory-container').innerHTML = '<p style="color:var(--gray)">No memory data.</p>'; return; }
  document.getElementById('memory-container').innerHTML = `
    <div class="memory-block">
      <h3>🧠 Long-Term Memory (MEMORY.md)</h3>
      <pre class="memory-raw">${escapeHtml(md)}</pre>
    </div>`;
}

function renderDaily(entries) {
  if (!entries || !entries.length) { document.getElementById('daily-container').innerHTML = '<p style="color:var(--gray)">No daily logs.</p>'; return; }
  document.getElementById('daily-container').innerHTML = entries.map(e => `
    <div class="day-entry">
      <h4>📓 ${e.date}</h4>
      <pre class="day-content">${escapeHtml(e.content)}</pre>
    </div>`).join('');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Load data if already authed
if (sessionStorage.getItem('winstonAuth') === '1') loadData();
</script>
</body>
</html>
